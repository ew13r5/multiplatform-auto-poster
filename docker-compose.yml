name: autoposter

services:
  api:
    container_name: autoposter-api
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    container_name: autoposter-worker
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - redis
      - postgres

  beat:
    container_name: autoposter-beat
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file: .env
    depends_on:
      - worker

  redis:
    container_name: autoposter-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - autoposter-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    container_name: autoposter-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-autoposter}
    ports:
      - "5432:5432"
    volumes:
      - autoposter-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "appuser", "-d", "autoposter"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    container_name: autoposter-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - autoposter-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    container_name: autoposter-frontend
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${API_KEY:-dev-api-key}
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  autoposter-postgres-data:
  autoposter-redis-data:
  autoposter-minio-data:
